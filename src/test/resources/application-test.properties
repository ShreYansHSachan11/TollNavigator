# Test Configuration
server.port=0

# Routing Service Configuration (test values)
routing.service.provider=google-maps
routing.service.api-key=test-api-key
routing.service.timeout=5000
routing.service.retry.max-attempts=3

# Toll Plaza Configuration
tollplaza.csv.path=classpath:data/test-toll-plazas.csv
tollplaza.route.proximity-threshold-km=2.0

# Cache Configuration
spring.cache.type=caffeine
spring.cache.caffeine.spec=maximumSize=100,expireAfterWrite=1h

# Logging Configuration
logging.level.root=INFO
logging.level.com.tollplaza=DEBUG
